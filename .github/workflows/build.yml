# Required GitHub Actions Secrets (Settings → Secrets and variables → Actions):
#
# DEFAULT_TOKEN      - Bearer auth token baked into the binary at compile time
#                      (optional; if unset, a random UUID is generated at runtime)
# DEFAULT_LISTENING  - Default listen address, e.g. 0.0.0.0:10010
#                      (optional; defaults to 0.0.0.0:10010)
# DEFAULT_HTTP_PROXY - Upstream HTTP proxy, e.g. http://127.0.0.1:9000
#                      (optional; defaults to empty / no proxy)
# DEFAULT_SKIP_TLS   - Skip upstream TLS verification: "true" or "false"
#                      (optional; defaults to true)

name: Build Releases

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS ARM64 (Apple Silicon)
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: remote_http_agent
            asset_name: remote_http_agent-macos-arm64
            use_cross: false
            features: ""

          # macOS x86_64 (Intel)
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: remote_http_agent
            asset_name: remote_http_agent-macos-x64
            use_cross: false
            features: ""

          # Windows 64-bit MSVC
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: remote_http_agent.exe
            asset_name: remote_http_agent-windows-x64.exe
            use_cross: false
            features: ""

          # Windows 64-bit MSVC (GUI, no console)
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: remote_http_agent.exe
            asset_name: remote_http_agent-windows-x64-gui.exe
            use_cross: false
            features: "gui"

          # Windows 32-bit MSVC
          - os: windows-latest
            target: i686-pc-windows-msvc
            artifact_name: remote_http_agent.exe
            asset_name: remote_http_agent-windows-x86.exe
            use_cross: false
            features: ""

          # Windows 32-bit MSVC (GUI, no console)
          - os: windows-latest
            target: i686-pc-windows-msvc
            artifact_name: remote_http_agent.exe
            asset_name: remote_http_agent-windows-x86-gui.exe
            use_cross: false
            features: "gui"

          # Windows 32-bit GNU (for Windows 7 compatibility)
          - os: windows-latest
            target: i686-pc-windows-gnu
            artifact_name: remote_http_agent.exe
            asset_name: remote_http_agent-windows-x86-gnu.exe
            use_cross: false
            features: ""

          # Windows 32-bit GNU GUI (for Windows 7 compatibility, no console)
          - os: windows-latest
            target: i686-pc-windows-gnu
            artifact_name: remote_http_agent.exe
            asset_name: remote_http_agent-windows-x86-gnu-gui.exe
            use_cross: false
            features: "gui"

          # Linux x86_64 glibc
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: remote_http_agent
            asset_name: remote_http_agent-linux-x64
            use_cross: false
            features: ""

          # Linux x86_64 musl (static, portable)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_name: remote_http_agent
            asset_name: remote_http_agent-linux-x64-musl
            use_cross: true
            features: ""

          # Linux ARM64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: remote_http_agent
            asset_name: remote_http_agent-linux-arm64
            use_cross: true
            features: ""

          # Linux ARM64 musl (static, portable)
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact_name: remote_http_agent
            asset_name: remote_http_agent-linux-arm64-musl
            use_cross: true
            features: ""

          # Linux ARMv7
          - os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            artifact_name: remote_http_agent
            asset_name: remote_http_agent-linux-armv7
            use_cross: true
            features: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross == true
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build release binary (native)
        if: matrix.use_cross == false
        env:
          DEFAULT_TOKEN: ${{ secrets.DEFAULT_TOKEN }}
          DEFAULT_LISTENING: ${{ secrets.DEFAULT_LISTENING }}
          DEFAULT_HTTP_PROXY: ${{ secrets.DEFAULT_HTTP_PROXY }}
          DEFAULT_SKIP_TLS: ${{ secrets.DEFAULT_SKIP_TLS }}
        run: |
          if [ -n "${{ matrix.features }}" ]; then
            cargo build --release --target ${{ matrix.target }} --features ${{ matrix.features }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Build release binary (cross)
        if: matrix.use_cross == true
        env:
          DEFAULT_TOKEN: ${{ secrets.DEFAULT_TOKEN }}
          DEFAULT_LISTENING: ${{ secrets.DEFAULT_LISTENING }}
          DEFAULT_HTTP_PROXY: ${{ secrets.DEFAULT_HTTP_PROXY }}
          DEFAULT_SKIP_TLS: ${{ secrets.DEFAULT_SKIP_TLS }}
        run: |
          if [ -n "${{ matrix.features }}" ]; then
            cross build --release --target ${{ matrix.target }} --features ${{ matrix.features }}
          else
            cross build --release --target ${{ matrix.target }}
          fi

      - name: Package artifact
        shell: bash
        run: |
          mkdir -p artifacts
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} artifacts/${{ matrix.asset_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: artifacts/${{ matrix.asset_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
